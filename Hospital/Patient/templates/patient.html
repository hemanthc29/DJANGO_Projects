<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Home - Hospital Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            --card-bg: rgba(255, 255, 255, 0.82);
            --card-border: rgba(255, 255, 255, 0.45);
            --text-main: #0f172a;
            --text-muted: #475569;
            --shadow: 0 10px 30px rgba(79, 70, 229, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 1rem;
        }

        .navbar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 3rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 4px 24px rgba(79, 70, 229, 0.06);
            animation: fadeInDown 0.6s ease;
        }

        .navbar a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            border-radius: 25px;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .navbar a:hover {
            color: var(--primary);
            background: rgba(255, 255, 255, 0.85);
        }

        .navbar a.active {
            color: #ffffff;
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: var(--shadow);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .brand-title {
            font-size: 1.6rem;
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .welcome-icon {
            width: 90px;
            height: 90px;
            background: rgba(79, 70, 229, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-size: 2.5rem;
            animation: pulse 2s infinite;
        }

        .welcome-text {
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.35); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(79, 70, 229, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/patient/" class="active">Home</a>
        <a href="/patient/details/">Details</a>
        <a href="/patient/report/">Medical Report</a>
        <a href="/patient/bill/">Bill</a>
    </div>

    <div class="container">
        <div class="welcome-icon">
            👤
        </div>
        <h1 class="brand-title">Hospital Management System</h1>
        <div class="welcome-text">Welcome to Patient Module</div>
        <div class="footer-note">Access your medical files, treatment status, and billing.</div>
    </div>

</body>
</html>
