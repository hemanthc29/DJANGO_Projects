<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile - Hospital Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #115e59;
            --bg-gradient: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-main: #0f172a;
            --text-muted: #475569;
            --shadow: 0 10px 30px rgba(15, 118, 110, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 1rem;
        }

        .navbar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 3rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 24px rgba(15, 118, 110, 0.06);
            animation: fadeInDown 0.6s ease;
        }

        .navbar a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            border-radius: 25px;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .navbar a:hover {
            color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
        }

        .navbar a.active {
            color: #ffffff;
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        h2.page-heading {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 2px solid rgba(15, 118, 110, 0.1);
            padding-bottom: 0.75rem;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.05rem;
            transition: var(--transition);
        }

        .info-item:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.75);
            border-color: var(--primary-light);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.04);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/doctor/">Home</a>
        <a href="/doctor/details/">Details</a>
        <a href="/doctor/profile/" class="active">Profile</a>
        <a href="/doctor/contact/">Contact</a>
    </div>

    <div class="container">
        <h2 class="page-heading">Doctor Profile</h2>
        <div class="info-grid">
            <div class="info-item">Qualification : {{ qualification }}</div>
            <div class="info-item">Department : {{ department }}</div>
            <div class="info-item">Available : {{ availability }}</div>
            <div class="info-item">Timing : {{ timing }}</div>
        </div>
    </div>

</body>
</html>
